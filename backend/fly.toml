app = "yai-excel-api"
primary_region = "bom"   # Mumbai — closest to Hackknow / India users
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  STORAGE_PATH = "/data/uploads"
  OUTPUT_PATH = "/data/outputs"
  ALLOWED_ORIGINS = "https://yexcel.hackknow.com,http://localhost:3000"
  LOG_LEVEL = "INFO"

[[mounts]]
  source = "yai_excel_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
