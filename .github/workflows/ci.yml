name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr ghostscript libgl1
      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke test builder
        working-directory: backend
        run: |
          python - <<'PY'
          from excel import YAIExcelBuilder
          for theme in ["midnight", "emerald", "crimson", "slate", "amber",
                        "ocean", "violet", "rose", "carbon", "arctic"]:
              YAIExcelBuilder(theme_name=theme, audit={}).save_to_path(f"test_{theme}.xlsx")
          print("✓ all 10 themes built")
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
