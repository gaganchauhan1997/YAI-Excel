name: Deploy Frontend → Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build + Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (static export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.yexcel.hackknow.com
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: be3a720d57d9b9d423eb4ba3bcd11686
          command: pages deploy frontend/out --project-name=yai-excel --branch=main
