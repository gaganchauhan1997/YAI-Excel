name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Required secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   – scoped token (Account:Cloudflare Pages:Edit)
#   CLOUDFLARE_ACCOUNT_ID  – the account ID hosting `yai-excel` pages project
# Optional secrets:
#   API_URL                – overrides NEXT_PUBLIC_API_URL at build time

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL || 'https://api.yexcel.hackknow.com' }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/out --project-name=yai-excel --branch=main --commit-dirty=true
