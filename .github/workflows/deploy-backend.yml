name: Deploy Backend → Render.com

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK not set — Render auto-deploys from GitHub directly."
          fi
